services:
  todo:
    build: .
    restart: unless-stopped
    volumes:
      - ./backend/active_records.json:/app/active_records.json
      - ./backend/completed_records.json:/app/completed_records.json
      - ./backend/num_records.txt:/app/num_records.txt

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
